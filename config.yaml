data: 
  raw_path: "data/raw/carclaims.csv"
  processed_path: "data/processed/carclaims_processed.csv"
  y: "FraudFound"

train:
  test_size: 0.2
  random_state: 42
  threshold: 0.5

model:
  RF:
    best_params:
      n_estimators: 61
      max_depth: 5
      min_samples_split: 8
      min_samples_leaf: 22
      random_state: 42
      class_weight: "balanced"

mlflow:
  experiment_name: "fraud_detection"