data: 
  raw_path: "data/raw/carclaims.csv"
  processed_path: "data/processed/carclaims_processed.csv"

model:
  name: RandomForestClassifier
  params:
    n_estimators: 100
    max_depth: 10
    min_samples_split: 2
    random_state: 42
    class_weight: "balanced"

evaluation:
  test_size: 0.2
  random_state: 42

mlflow:
  experiment_name: "fraud_detection"